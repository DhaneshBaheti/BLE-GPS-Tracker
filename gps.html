<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MyPerro — Live Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a38;--accent:#7c6dfa;--accent2:#fa6d8a;--accent3:#6dfacc;--text:#e8e8f0;--muted:#6b6b80;--warn:#facc6d;--sidebar-w:380px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,109,250,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(124,109,250,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}

.layout{display:flex;position:relative;z-index:1;min-height:100vh;}
.main{flex:1;padding:24px;overflow-y:auto;transition:margin-right .3s;}
.main.sidebar-open{margin-right:var(--sidebar-w);}

/* ── Sidebar ── */
.sidebar{position:fixed;top:0;right:0;width:var(--sidebar-w);height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:900;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.sidebar.open{transform:translateX(0);}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:20px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sidebar-title{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px;}
.sidebar-title .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:all .3s;}
.sidebar-title .dot.connected{background:var(--accent3);box-shadow:0 0 8px var(--accent3);animation:pulse 2s infinite;}
.sidebar-close{background:none;border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.sidebar-close:hover{border-color:var(--accent2);color:var(--accent2);}

.ble-controls{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px;flex-shrink:0;}
.ble-device-info{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);padding:8px 12px;background:var(--bg);border-radius:8px;border:1px solid var(--border);}
.ble-device-info .dev-name{color:var(--accent);font-weight:500;}
.ble-btn-row{display:flex;gap:8px;}
.btn-ble{flex:1;padding:10px;border-radius:8px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;border:none;text-align:center;}
.btn-connect{background:linear-gradient(135deg,var(--accent),#6d5de6);color:#fff;}
.btn-connect:hover{opacity:.9;transform:translateY(-1px);}
.btn-connect:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-disconnect{background:rgba(250,109,138,0.1);border:1px solid rgba(250,109,138,0.3);color:var(--accent2);}
.btn-disconnect:hover{background:rgba(250,109,138,0.2);}
.btn-disconnect:disabled{opacity:.4;cursor:not-allowed;}

.log-filter{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;}
.filter-chip{padding:4px 10px;border-radius:6px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s;}
.filter-chip:hover{border-color:var(--accent);}
.filter-chip.active{background:rgba(124,109,250,0.12);border-color:var(--accent);color:var(--accent);}

.log-container{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth;}
.log-container::-webkit-scrollbar{width:5px;}
.log-container::-webkit-scrollbar-track{background:transparent;}
.log-container::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.log-entry{font-family:'DM Mono',monospace;font-size:11px;line-height:1.6;padding:3px 8px;border-radius:4px;display:flex;gap:8px;word-break:break-all;transition:background .15s;}
.log-entry:hover{background:var(--surface2);}
.log-ts{color:var(--muted);flex-shrink:0;opacity:.6;}
.log-entry.info .log-msg{color:var(--text);}
.log-entry.data .log-msg{color:var(--accent3);}
.log-entry.error .log-msg{color:var(--accent2);}
.log-entry.warn .log-msg{color:var(--warn);}
.log-entry.system .log-msg{color:var(--accent);font-style:italic;}
.log-entry.gps .log-msg{color:#a78bfa;}

.log-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:8px;color:var(--muted);opacity:.5;}
.log-empty-icon{font-size:32px;}
.log-empty-text{font-family:'DM Mono',monospace;font-size:12px;text-align:center;line-height:1.6;}

.send-row{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.send-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;transition:border-color .2s;}
.send-input:focus{border-color:var(--accent);}
.send-input::placeholder{color:var(--muted);opacity:.5;}
.btn-send{padding:8px 14px;border-radius:8px;background:var(--accent);border:none;color:#fff;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;transition:all .2s;}
.btn-send:hover{opacity:.85;}
.btn-send:disabled{opacity:.3;cursor:not-allowed;}

.log-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.log-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.log-actions{display:flex;gap:6px;}
.btn-log-action{padding:5px 10px;border-radius:6px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s;}
.btn-log-action:hover{border-color:var(--accent);color:var(--text);}

/* ── Dashboard Styles ── */
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-text{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.logo-text span{color:var(--accent);}
.header-right{display:flex;align-items:center;gap:12px;}
.status-pill{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:6px 14px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:all .3s;}
.status-dot.live{background:var(--accent3);box-shadow:0 0 8px var(--accent3);animation:pulse 2s infinite;}
.status-dot.error{background:var(--accent2);box-shadow:0 0 8px var(--accent2);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 20px;transition:all .2s;}
.stat-card:hover{border-color:var(--accent);transform:translateY(-1px);}
.stat-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.stat-value{font-size:24px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--text),var(--muted));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat-value.accent{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat-value.green{background:linear-gradient(135deg,var(--accent3),#4ae0a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;}

.map-wrapper{position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--border);height:520px;background:var(--surface);}
#map{width:100%;height:100%;z-index:1;}
.map-overlay{position:absolute;top:16px;left:16px;z-index:1000;display:flex;flex-direction:column;gap:8px;}
.overlay-pill{background:rgba(10,10,15,0.85);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.overlay-pill .val{color:var(--text);font-weight:500;}

.controls-row{display:flex;align-items:center;justify-content:space-between;margin-top:16px;}
.controls-left{display:flex;gap:8px;flex-wrap:wrap;}
.btn-sm{border-radius:8px;padding:8px 16px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;border:none;}
.btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--accent);color:var(--text);}
.btn-ghost.active{border-color:var(--accent);color:var(--accent);background:rgba(124,109,250,0.08);}
.btn-accent{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;}
.btn-accent:hover{opacity:.9;}
.btn-ble-toggle{background:var(--surface2);border:1px solid var(--border);color:var(--muted);position:relative;}
.btn-ble-toggle:hover{border-color:var(--accent3);color:var(--accent3);}
.btn-ble-toggle.connected{border-color:var(--accent3);color:var(--accent3);}
.ble-indicator{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:4px;}
.btn-ble-toggle.connected .ble-indicator{background:var(--accent3);box-shadow:0 0 6px var(--accent3);}
.time-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}

.loading-map{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--surface);z-index:500;flex-direction:column;gap:12px;}
.loading-map .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-map .load-text{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}

.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 20px;font-family:'DM Mono',monospace;font-size:13px;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:9999;max-width:380px;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.success{border-color:var(--accent3);}
.toast.error{border-color:var(--accent2);}
.toast.warn{border-color:var(--warn);}

.leaflet-tile-pane{filter:brightness(0.7) invert(1) contrast(1.1) hue-rotate(200deg) saturate(0.4) brightness(0.8);}
.leaflet-control-zoom a{background:var(--surface)!important;color:var(--text)!important;border-color:var(--border)!important;}
.leaflet-control-zoom a:hover{background:var(--surface2)!important;}
.leaflet-control-attribution{display:none!important;}
.pulse-marker{width:14px;height:14px;background:var(--accent);border:3px solid var(--accent3);border-radius:50%;box-shadow:0 0 16px var(--accent),0 0 40px rgba(124,109,250,0.3);animation:markerPulse 2s infinite;}
@keyframes markerPulse{0%,100%{box-shadow:0 0 16px var(--accent),0 0 40px rgba(124,109,250,0.3)}50%{box-shadow:0 0 24px var(--accent),0 0 60px rgba(124,109,250,0.5)}}

@media(max-width:900px){
  .stats-row{grid-template-columns:1fr 1fr;}
  .map-wrapper{height:380px;}
  .controls-row{flex-direction:column;gap:12px;align-items:flex-start;}
  .sidebar{width:100%;}
  .main.sidebar-open{margin-right:0;}
}
</style>
</head>
<body>
<div class="layout">
  <div class="main" id="mainContent">
    <header>
      <div class="logo">
        <div class="logo-icon">🐾</div>
        <div class="logo-text">my<span>perro</span></div>
      </div>
      <div class="header-right">
        <div class="status-pill">
          <span class="status-dot" id="connDot"></span>
          <span id="connLabel">connecting...</span>
        </div>
      </div>
    </header>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Current Lat</div>
        <div class="stat-value accent" id="statLat">—</div>
        <div class="stat-sub" id="statLatSub">waiting...</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Current Lng</div>
        <div class="stat-value accent" id="statLng">—</div>
        <div class="stat-sub" id="statLngSub">waiting...</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Data Points</div>
        <div class="stat-value green" id="statPoints">0</div>
        <div class="stat-sub" id="statPointsSub">total tracked</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Last Update</div>
        <div class="stat-value" id="statTime">—</div>
        <div class="stat-sub" id="statTimeSub">—</div>
      </div>
    </div>

    <div class="map-wrapper">
      <div class="loading-map" id="mapLoader">
        <div class="spinner"></div>
        <div class="load-text">fetching coordinates...</div>
      </div>
      <div class="map-overlay" id="mapOverlay" style="display:none;">
        <div class="overlay-pill">🐾 <span class="val" id="overlayCoord">—</span></div>
      </div>
      <div id="map"></div>
    </div>

    <div class="controls-row">
      <div class="controls-left">
        <button class="btn-sm btn-ghost" onclick="fitBounds()">⊡ fit all</button>
        <button class="btn-sm btn-ghost" onclick="goLatest()">◎ latest</button>
        <button class="btn-sm btn-ghost active" id="btnTrail" onclick="toggleTrail()">◠ trail on</button>
        <button class="btn-sm btn-accent" onclick="refreshData()">↻ refresh</button>
        <button class="btn-sm btn-ble-toggle" id="btnBleToggle" onclick="toggleSidebar()">
          <span class="ble-indicator"></span>BLE Logs
        </button>
      </div>
      <div class="time-label" id="refreshLabel">auto-refresh: 10s</div>
    </div>
  </div>

  <!-- ── BLE Sidebar ── -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">
        <span class="dot" id="bleDot"></span>
        BLE Serial Logs
      </div>
      <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
    </div>

    <div class="ble-controls">
      <div class="ble-device-info" id="bleDeviceInfo">No device connected</div>
      <div class="ble-btn-row">
        <button class="btn-ble btn-connect" id="btnConnect" onclick="connectBLE()">⚡ Connect Device</button>
        <button class="btn-ble btn-disconnect" id="btnDisconnect" onclick="disconnectBLE()" disabled>✕ Disconnect</button>
      </div>
    </div>

    <div class="log-filter">
      <button class="filter-chip active" onclick="setFilter('all',this)">All</button>
      <button class="filter-chip" onclick="setFilter('data',this)">Data</button>
      <button class="filter-chip" onclick="setFilter('gps',this)">GPS</button>
      <button class="filter-chip" onclick="setFilter('error',this)">Errors</button>
      <button class="filter-chip" onclick="setFilter('system',this)">System</button>
    </div>

    <div class="log-container" id="logContainer">
      <div class="log-empty" id="logEmpty">
        <div class="log-empty-icon">📡</div>
        <div class="log-empty-text">Connect a BLE device to see logs<br/>Uses Nordic UART Service (NUS)</div>
      </div>
    </div>

    <div class="send-row">
      <input type="text" class="send-input" id="sendInput" placeholder="Send command..." disabled/>
      <button class="btn-send" id="btnSend" onclick="sendCommand()" disabled>→</button>
    </div>

    <div class="log-footer">
      <div class="log-count" id="logCount">0 entries</div>
      <div class="log-actions">
        <button class="btn-log-action" onclick="exportLogs()">↓ export</button>
        <button class="btn-log-action" onclick="clearLogs()">✕ clear</button>
        <button class="btn-log-action" id="btnAutoScroll" onclick="toggleAutoScroll()">▼ auto-scroll</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// Config
// ═══════════════════════════════════════
const TB_HOST = "https://thingsboard.cloud";
const TB_USER = "junglemungle64@gmail.com";
const TB_PASS = "liftkaradey";
const DEVICE_ID = "bddbb0f0-1440-11f1-840f-e9bf6f45218f";
const REFRESH_INTERVAL = 10000;

// Nordic UART Service UUIDs (standard ESP32 BLE Serial)
const NUS_SERVICE  = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const NUS_TX_CHAR  = "6e400003-b5a3-f393-e0a9-e50e24dcca9e"; // notify: device → browser
const NUS_RX_CHAR  = "6e400002-b5a3-f393-e0a9-e50e24dcca9e"; // write:  browser → device

// ═══════════════════════════════════════
// State
// ═══════════════════════════════════════
let jwtToken = null, tokenExpiry = 0;
let map, trailLine, markerLayer;
let allCoords = [], trailVisible = true;

let bleDevice = null, bleServer = null, bleTxChar = null, bleRxChar = null;
let bleConnected = false, bleBuffer = '';
let logEntries = [], logFilter = 'all', autoScroll = true;

// ═══════════════════════════════════════
// ThingsBoard
// ═══════════════════════════════════════
async function getToken() {
  if (jwtToken && Date.now() < tokenExpiry - 60000) return jwtToken;
  const r = await fetch(`${TB_HOST}/api/auth/login`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username: TB_USER, password: TB_PASS })
  });
  if (!r.ok) throw new Error("Auth failed: " + r.status);
  const d = await r.json(); jwtToken = d.token; tokenExpiry = Date.now() + 3600000;
  return jwtToken;
}

async function fetchAllTelemetry() {
  const t = await getToken();
  const r = await fetch(`${TB_HOST}/api/plugins/telemetry/DEVICE/${DEVICE_ID}/values/timeseries?keys=latitude,longitude&startTs=0&endTs=${Date.now()}&limit=10000&agg=NONE&orderBy=ASC`,
    { headers: { "X-Authorization": "Bearer " + t } });
  if (!r.ok) throw new Error("Telemetry " + r.status);
  return r.json();
}

async function fetchSharedAttrs() {
  const t = await getToken();
  const r = await fetch(`${TB_HOST}/api/plugins/telemetry/DEVICE/${DEVICE_ID}/values/attributes/SHARED_SCOPE?keys=latitude,longitude`,
    { headers: { "X-Authorization": "Bearer " + t } });
  if (!r.ok) throw new Error("Attr " + r.status);
  const arr = await r.json(); const o = {};
  arr.forEach(x => o[x.key] = { value: x.value, ts: x.lastUpdateTs });
  return o;
}

function parseTelemetry(data) {
  const byTs = {};
  (data.latitude || []).forEach(p => { byTs[p.ts] = byTs[p.ts] || {}; byTs[p.ts].lat = parseFloat(p.value); byTs[p.ts].ts = p.ts; });
  (data.longitude || []).forEach(p => { byTs[p.ts] = byTs[p.ts] || {}; byTs[p.ts].lng = parseFloat(p.value); byTs[p.ts].ts = p.ts; });
  return Object.values(byTs).filter(c => c.lat != null && c.lng != null && !isNaN(c.lat) && !isNaN(c.lng)).sort((a, b) => a.ts - b.ts);
}

// ═══════════════════════════════════════
// Map
// ═══════════════════════════════════════
function initMap() {
  map = L.map('map', { zoomControl: true, attributionControl: false }).setView([12.93291, 77.634247], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
  trailLine = L.polyline([], { color: '#7c6dfa', weight: 3, opacity: 0.8 }).addTo(map);
  markerLayer = L.layerGroup().addTo(map);
}

function updateMap(coords) {
  if (!coords.length) return;
  markerLayer.clearLayers();
  trailLine.setLatLngs(coords.map(c => [c.lat, c.lng]));
  trailLine.setStyle({ opacity: trailVisible ? 0.8 : 0 });

  coords.forEach((c, i) => {
    if (i === coords.length - 1) return;
    const dot = L.circleMarker([c.lat, c.lng], { radius: 4, fillColor: '#7c6dfa', fillOpacity: 0.5, color: '#7c6dfa', weight: 1, opacity: 0.3 });
    dot.bindPopup(`<div style="font-family:monospace;font-size:12px"><b>Point ${i+1}</b><br>${c.lat.toFixed(6)}, ${c.lng.toFixed(6)}<br>${new Date(c.ts).toLocaleString()}</div>`);
    markerLayer.addLayer(dot);
  });

  const latest = coords[coords.length - 1];
  const icon = L.divIcon({ className: '', html: '<div class="pulse-marker"></div>', iconSize: [14, 14], iconAnchor: [7, 7] });
  L.marker([latest.lat, latest.lng], { icon }).bindPopup(`<div style="font-family:monospace;font-size:12px"><b>🐾 Latest</b><br>${latest.lat.toFixed(6)}, ${latest.lng.toFixed(6)}<br>${new Date(latest.ts).toLocaleString()}</div>`).addTo(markerLayer);

  if (coords.length > 1) {
    const s = coords[0];
    const si = L.divIcon({ className: '', html: '<div style="width:10px;height:10px;background:#6dfacc;border:2px solid #fff;border-radius:50%;box-shadow:0 0 8px #6dfacc"></div>', iconSize: [10, 10], iconAnchor: [5, 5] });
    L.marker([s.lat, s.lng], { icon: si }).bindPopup(`<div style="font-family:monospace;font-size:12px"><b>Start</b><br>${s.lat.toFixed(6)}, ${s.lng.toFixed(6)}<br>${new Date(s.ts).toLocaleString()}</div>`).addTo(markerLayer);
  }
}

function updateStats(coords) {
  if (!coords.length) return;
  const l = coords[coords.length - 1];
  document.getElementById('statLat').textContent = l.lat.toFixed(6);
  document.getElementById('statLng').textContent = l.lng.toFixed(6);
  document.getElementById('statPoints').textContent = coords.length;
  document.getElementById('statLatSub').textContent = 'latitude';
  document.getElementById('statLngSub').textContent = 'longitude';
  document.getElementById('statTime').textContent = timeAgo(l.ts);
  document.getElementById('statTimeSub').textContent = new Date(l.ts).toLocaleTimeString();
  document.getElementById('overlayCoord').textContent = `${l.lat.toFixed(6)}, ${l.lng.toFixed(6)}`;
  document.getElementById('mapOverlay').style.display = 'flex';
}

async function refreshData() {
  try {
    const telem = await fetchAllTelemetry();
    let coords = parseTelemetry(telem);
    if (!coords.length) {
      const attrs = await fetchSharedAttrs();
      if (attrs.latitude && attrs.longitude) coords = [{ lat: parseFloat(attrs.latitude.value), lng: parseFloat(attrs.longitude.value), ts: attrs.latitude.ts || Date.now() }];
    }
    if (!coords.length) { showToast("⚠ No coordinates found", "warn"); return; }
    allCoords = coords; updateMap(coords); updateStats(coords);
    setStatus('live', 'connected');
    document.getElementById('mapLoader').style.display = 'none';
    document.getElementById('refreshLabel').textContent = `auto-refresh: 10s · ${coords.length} pts · ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    setStatus('error', 'error');
    showToast("✗ " + e.message, "error");
    document.getElementById('mapLoader').style.display = 'none';
  }
}

function fitBounds() { if (allCoords.length) map.fitBounds(L.latLngBounds(allCoords.map(c => [c.lat, c.lng])), { padding: [50, 50], maxZoom: 17 }); }
function goLatest() { if (allCoords.length) { const l = allCoords[allCoords.length - 1]; map.setView([l.lat, l.lng], 17, { animate: true }); } }
function toggleTrail() {
  trailVisible = !trailVisible;
  trailLine.setStyle({ opacity: trailVisible ? 0.8 : 0 });
  const b = document.getElementById('btnTrail');
  b.textContent = trailVisible ? '◠ trail on' : '◠ trail off';
  b.classList.toggle('active', trailVisible);
}

// ═══════════════════════════════════════
// BLE Serial
// ═══════════════════════════════════════
async function connectBLE() {
  if (!navigator.bluetooth) {
    showToast("✗ Web Bluetooth not supported — use Chrome/Edge", "error");
    addLog("Web Bluetooth API not available", "error");
    return;
  }

  const btn = document.getElementById('btnConnect');
  btn.disabled = true; btn.textContent = '⏳ Scanning...';
  addLog("Scanning for BLE devices...", "system");

  try {
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ services: [NUS_SERVICE] }],
      optionalServices: [NUS_SERVICE]
    });

    addLog(`Selected: ${bleDevice.name || 'Unknown'}`, "system");
    bleDevice.addEventListener('gattserverdisconnected', onBleDisconnected);

    addLog("Connecting GATT...", "system");
    bleServer = await bleDevice.gatt.connect();

    addLog("Getting NUS service...", "system");
    const service = await bleServer.getPrimaryService(NUS_SERVICE);

    bleTxChar = await service.getCharacteristic(NUS_TX_CHAR);
    await bleTxChar.startNotifications();
    bleTxChar.addEventListener('characteristicvaluechanged', onBleData);
    addLog("TX notifications started", "system");

    try {
      bleRxChar = await service.getCharacteristic(NUS_RX_CHAR);
      document.getElementById('sendInput').disabled = false;
      document.getElementById('btnSend').disabled = false;
      addLog("RX characteristic ready — send enabled", "system");
    } catch (e) {
      addLog("RX not found — send disabled", "warn");
    }

    bleConnected = true;
    updateBleUI();
    addLog(`✓ Connected to ${bleDevice.name || 'BLE Device'}`, "system");
    showToast(`✓ BLE: ${bleDevice.name || 'Device'}`, "success");

  } catch (e) {
    if (e.name === 'NotFoundError') {
      addLog("No device selected", "warn");
    } else {
      addLog(`Connection failed: ${e.message}`, "error");
      showToast("✗ BLE: " + e.message, "error");
    }
  } finally {
    btn.disabled = false; btn.textContent = '⚡ Connect Device';
  }
}

function disconnectBLE() {
  if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
  onBleDisconnected();
}

function onBleDisconnected() {
  bleConnected = false; bleServer = null; bleTxChar = null; bleRxChar = null; bleBuffer = '';
  updateBleUI();
  addLog("⚡ Disconnected", "system");
  showToast("BLE disconnected", "warn");
}

function onBleData(event) {
  const chunk = new TextDecoder().decode(event.target.value);
  bleBuffer += chunk;
  const lines = bleBuffer.split('\n');
  bleBuffer = lines.pop();

  lines.forEach(line => {
    line = line.trim();
    if (!line) return;
    const lower = line.toLowerCase();
    let type = 'data';
    if (lower.includes('error') || lower.includes('fail')) type = 'error';
    else if (lower.includes('warn')) type = 'warn';
    else if (lower.includes('lat') || lower.includes('lng') || lower.includes('gps') || lower.includes('fix') || lower.includes('nmea')) type = 'gps';
    else if (lower.includes('boot') || lower.includes('init') || lower.includes('ready') || lower.includes('start') || lower.includes('connected')) type = 'system';
    addLog(line, type);
  });
}

async function sendCommand() {
  const input = document.getElementById('sendInput');
  const cmd = input.value.trim();
  if (!cmd || !bleRxChar) return;
  try {
    const data = new TextEncoder().encode(cmd + '\n');
    for (let i = 0; i < data.length; i += 20) {
      await bleRxChar.writeValue(data.slice(i, i + 20));
    }
    addLog(`→ ${cmd}`, 'system');
    input.value = '';
  } catch (e) { addLog(`Send failed: ${e.message}`, 'error'); }
}

function updateBleUI() {
  const dot = document.getElementById('bleDot');
  const info = document.getElementById('bleDeviceInfo');
  const toggle = document.getElementById('btnBleToggle');
  if (bleConnected && bleDevice) {
    dot.classList.add('connected');
    info.innerHTML = `<span class="dev-name">${bleDevice.name || 'Unknown'}</span> · connected`;
    document.getElementById('btnConnect').disabled = true;
    document.getElementById('btnConnect').textContent = '✓ Connected';
    document.getElementById('btnDisconnect').disabled = false;
    toggle.classList.add('connected');
    document.getElementById('logEmpty').style.display = 'none';
  } else {
    dot.classList.remove('connected');
    info.textContent = 'No device connected';
    document.getElementById('btnConnect').disabled = false;
    document.getElementById('btnConnect').textContent = '⚡ Connect Device';
    document.getElementById('btnDisconnect').disabled = true;
    document.getElementById('sendInput').disabled = true;
    document.getElementById('btnSend').disabled = true;
    toggle.classList.remove('connected');
  }
}

// ═══════════════════════════════════════
// Logging
// ═══════════════════════════════════════
function addLog(msg, type = 'info') {
  const entry = { ts: Date.now(), msg, type };
  logEntries.push(entry);
  document.getElementById('logEmpty').style.display = 'none';
  if (logFilter === 'all' || logFilter === type) renderLogEntry(entry);
  updateLogCount();
  if (autoScroll) {
    const c = document.getElementById('logContainer');
    requestAnimationFrame(() => c.scrollTop = c.scrollHeight);
  }
}

function renderLogEntry(entry) {
  const el = document.createElement('div');
  el.className = `log-entry ${entry.type}`;
  const t = new Date(entry.ts);
  const ts = t.toLocaleTimeString('en-US', { hour12: false }) + '.' + String(t.getMilliseconds()).padStart(3, '0');
  el.innerHTML = `<span class="log-ts">${ts}</span><span class="log-msg">${escapeHtml(entry.msg)}</span>`;
  document.getElementById('logContainer').appendChild(el);
}

function setFilter(f, btn) {
  logFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  rerenderLogs();
}

function rerenderLogs() {
  document.querySelectorAll('.log-entry').forEach(el => el.remove());
  const filtered = logFilter === 'all' ? logEntries : logEntries.filter(e => e.type === logFilter);
  if (!filtered.length && !logEntries.length) document.getElementById('logEmpty').style.display = 'flex';
  else { document.getElementById('logEmpty').style.display = 'none'; filtered.forEach(renderLogEntry); }
  updateLogCount();
}

function clearLogs() {
  logEntries = [];
  document.querySelectorAll('.log-entry').forEach(el => el.remove());
  if (!bleConnected) document.getElementById('logEmpty').style.display = 'flex';
  updateLogCount();
}

function exportLogs() {
  if (!logEntries.length) { showToast("No logs", "warn"); return; }
  const text = logEntries.map(e => `[${new Date(e.ts).toISOString()}] [${e.type.toUpperCase()}] ${e.msg}`).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], { type: 'text/plain' }));
  a.download = `myperro-ble-${new Date().toISOString().slice(0,10)}.log`;
  a.click(); URL.revokeObjectURL(a.href);
  showToast("✓ Exported", "success");
}

function toggleAutoScroll() {
  autoScroll = !autoScroll;
  document.getElementById('btnAutoScroll').textContent = autoScroll ? '▼ auto-scroll' : '▽ paused';
}

function updateLogCount() {
  const n = logFilter === 'all' ? logEntries.length : logEntries.filter(e => e.type === logFilter).length;
  document.getElementById('logCount').textContent = `${n}${logFilter !== 'all' ? ' / ' + logEntries.length : ''} entries`;
}

// ═══════════════════════════════════════
// Sidebar
// ═══════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mainContent').classList.toggle('sidebar-open');
  setTimeout(() => { if (map) map.invalidateSize(); }, 350);
}

// ═══════════════════════════════════════
// Helpers
// ═══════════════════════════════════════
function setStatus(c, l) { document.getElementById('connDot').className = 'status-dot ' + c; document.getElementById('connLabel').textContent = l; }
function timeAgo(ts) { const s = Math.floor((Date.now() - ts) / 1000); if (s < 5) return "now"; if (s < 60) return s + "s ago"; if (s < 3600) return Math.floor(s / 60) + "m ago"; if (s < 86400) return Math.floor(s / 3600) + "h ago"; return Math.floor(s / 86400) + "d ago"; }
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showToast(msg, type) { const t = document.getElementById("toast"); t.textContent = msg; t.className = "toast " + (type || ""); t.classList.add("show"); clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove("show"), 3800); }

document.getElementById('sendInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendCommand(); });

window.onload = function() { initMap(); refreshData(); setInterval(refreshData, REFRESH_INTERVAL); };
</script>
